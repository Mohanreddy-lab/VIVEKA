services:

  manthan-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  manthan-ui:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - ./data:/app/data
    command: streamlit run src/demo.py --server.address 0.0.0.0 --server.port 8501
    restart: unless-stopped
